<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Web Drop</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #1d2a3a;
      --muted: #5e6b7b;
      --accent: #2f6fe4;
      --accent-soft: #e8f0ff;
      --border: #d9e2ef;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1100px 500px at 0% -20%, #dce8ff 0%, transparent 65%),
        radial-gradient(900px 450px at 100% -10%, #e8f8ef 0%, transparent 60%),
        var(--bg);
      min-height: 100vh;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .hero {
      background: linear-gradient(120deg, #163058 0%, #2f6fe4 100%);
      border-radius: 16px;
      color: #fff;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(22, 48, 88, 0.25);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 2.2vw, 2rem);
      line-height: 1.2;
    }

    .subtitle {
      margin: 0;
      color: rgba(255, 255, 255, 0.9);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(23, 34, 51, 0.06);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .meta {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    li + li { margin-top: 8px; }

    a.file-link {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--ink);
      background: #fff;
      transition: border-color 0.12s ease, transform 0.12s ease, box-shadow 0.12s ease;
    }

    a.file-link:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(47, 111, 228, 0.12);
    }

    .name { font-weight: 600; }

    .path {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.88rem;
      word-break: break-all;
    }

    .empty,
    .error {
      margin: 0;
      padding: 14px;
      border-radius: 10px;
      border: 1px dashed var(--border);
      color: var(--muted);
      background: #fbfcff;
    }

    .error {
      border-color: #f2c0c0;
      background: #fff6f6;
      color: #7c2f2f;
    }

    .tip {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    code {
      background: #eef3fb;
      border: 1px solid #dbe5f5;
      border-radius: 6px;
      padding: 1px 6px;
      font-family: Consolas, "SFMono-Regular", Menlo, monospace;
      font-size: 0.88em;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>AI Web Drop</h1>
      <p class="subtitle">Drop any <code>.html</code> file into this repo and it will appear here automatically on GitHub Pages.</p>
    </section>

    <section class="panel" aria-live="polite">
      <div class="row">
        <p class="meta" id="repo-label">Detecting repository...</p>
        <span class="badge" id="count-badge">0 files</span>
      </div>
      <div id="state"></div>
      <ul id="file-list"></ul>
      <p class="tip">Note: this index is built from the GitHub repository tree API, so updates appear after your latest push is available.</p>
    </section>
  </main>

  <script>
    const stateEl = document.getElementById("state");
    const listEl = document.getElementById("file-list");
    const countBadgeEl = document.getElementById("count-badge");
    const repoLabelEl = document.getElementById("repo-label");

    function setState(message, type) {
      stateEl.innerHTML = "";
      if (!message) {
        return;
      }
      const p = document.createElement("p");
      p.className = type === "error" ? "error" : "empty";
      p.textContent = message;
      stateEl.appendChild(p);
    }

    function encodePath(path) {
      return path.split("/").map(encodeURIComponent).join("/");
    }

    function detectGitHubPagesRepo() {
      const host = window.location.hostname;
      const pathParts = window.location.pathname.replace(/^\/+/, "").split("/").filter(Boolean);

      if (!host.endsWith("github.io")) {
        throw new Error("This index is designed to run from GitHub Pages (hostname ending in github.io).");
      }

      const owner = host.replace(/\.github\.io$/, "");

      if (pathParts.length === 0) {
        return {
          owner,
          repo: owner + ".github.io",
          siteBasePath: "/"
        };
      }

      return {
        owner,
        repo: pathParts[0],
        siteBasePath: "/" + pathParts[0] + "/"
      };
    }

    async function fetchJson(url) {
      const res = await fetch(url, { headers: { "Accept": "application/vnd.github+json" } });
      if (!res.ok) {
        throw new Error("GitHub API request failed (" + res.status + ").");
      }
      return res.json();
    }

    async function loadFiles() {
      setState("Loading HTML files...");
      listEl.innerHTML = "";

      const repoInfo = detectGitHubPagesRepo();
      repoLabelEl.textContent = repoInfo.owner + "/" + repoInfo.repo;

      const repoMeta = await fetchJson("https://api.github.com/repos/" + repoInfo.owner + "/" + repoInfo.repo);
      const branch = repoMeta.default_branch || "main";

      const tree = await fetchJson(
        "https://api.github.com/repos/" + repoInfo.owner + "/" + repoInfo.repo + "/git/trees/" + encodeURIComponent(branch) + "?recursive=1"
      );

      const htmlFiles = (tree.tree || [])
        .filter((item) => item.type === "blob")
        .map((item) => item.path)
        .filter((path) => path.toLowerCase().endsWith(".html"))
        .filter((path) => path.toLowerCase() !== "index.html")
        .sort((a, b) => a.localeCompare(b));

      countBadgeEl.textContent = htmlFiles.length + (htmlFiles.length === 1 ? " file" : " files");

      if (htmlFiles.length === 0) {
        setState("No HTML files found yet. Add one and push to GitHub.");
        return;
      }

      setState("");

      htmlFiles.forEach((filePath) => {
        const href = repoInfo.siteBasePath + encodePath(filePath);
        const name = filePath.split("/").pop();

        const li = document.createElement("li");
        const a = document.createElement("a");
        const nameEl = document.createElement("div");
        const pathEl = document.createElement("div");

        a.className = "file-link";
        a.href = href;

        nameEl.className = "name";
        nameEl.textContent = name;

        pathEl.className = "path";
        pathEl.textContent = filePath;

        a.appendChild(nameEl);
        a.appendChild(pathEl);
        li.appendChild(a);
        listEl.appendChild(li);
      });
    }

    loadFiles().catch((err) => {
      countBadgeEl.textContent = "0 files";
      setState(err.message, "error");
    });
  </script>
</body>
</html>
